databases:
  - name: bookstore_db
    databaseName: bookstore
    user: bookstore_user
    plan: free

services:
  - type: web
    name: bookstore_app
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore_db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
    preDeployCommand: bundle exec rails db:migrate && bundle exec rails db:seed
    healthCheckPath: /up
    autoDeploy: true

  - type: worker
    name: bookstore_worker
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore_db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
    command: bundle exec rails solid_queue:start
